<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Chi Tiết Đơn Hàng — BêTráp</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <style>
    .detail-layout{display:grid;grid-template-columns:1fr 340px;gap:var(--sp-xl);padding:var(--sp-xl) 0}
    .section-card{background:white;border-radius:var(--r-xl);padding:var(--sp-xl);box-shadow:var(--shadow-sm);margin-bottom:var(--sp-lg)}
    .section-card-title{font-family:var(--font-h);font-size:1.2rem;font-weight:700;margin-bottom:var(--sp-lg);padding-bottom:var(--sp-md);border-bottom:1px solid rgba(220,165,174,.08);display:flex;align-items:center;gap:var(--sp-sm)}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:var(--sp-sm) 0;font-size:.9rem;border-bottom:1px solid rgba(220,165,174,.05)}
    .info-row:last-child{border-bottom:none}
    .info-row .label{color:var(--text-muted)}
    .info-row .val{font-weight:600;color:var(--text-dark);text-align:right;max-width:60%}
    .side-card{background:white;border-radius:var(--r-xl);box-shadow:var(--shadow-md);padding:var(--sp-xl);position:sticky;top:calc(var(--nav-h)+var(--sp-lg));border:1px solid rgba(191,167,162,.1)}
    /* Status banners */
    .status-banner{border-radius:var(--r-md);padding:var(--sp-md) var(--sp-lg);margin-bottom:var(--sp-lg);font-size:.875rem;display:flex;align-items:flex-start;gap:var(--sp-sm)}
    .status-banner.waiting{background:#fff8e1;border:1px solid #ffe082;color:#f57f17}
    .status-banner.confirmed{background:#e8f5e9;border:1px solid #a5d6a7;color:#2e7d32}
    .status-banner.cancelled{background:#ffebee;border:1px solid #ef9a9a;color:#c62828}
    .status-banner.done{background:#e3f2fd;border:1px solid #90caf9;color:#1565c0}
    /* Review star picker */
    .star-picker{display:flex;gap:var(--sp-sm);font-size:2rem;cursor:pointer}
    .star-btn{color:#DDD;transition:color var(--t-fast)}
    .star-btn.active,.star-btn:hover{color:var(--gold-light)}
    @media(max-width:1024px){.detail-layout{grid-template-columns:1fr}.side-card{position:static}}
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-header">
    <div class="container">
      <h1>Chi Tiết Đơn Hàng</h1>
      <p>Thông tin và trạng thái đơn hàng của bạn</p>
    </div>
  </div>

  <div class="container page-content" style="padding-top:0">
    <div id="checkout-content">
      <div style="text-align:center;padding:var(--sp-3xl)"><div class="spinner"></div></div>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="modal-overlay"></div>
  <script src="../js/db.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    let txnData = null;
    let hasReview = false;
    let reviewRating = 5;

    document.addEventListener('DOMContentLoaded', async () => {
      UI.initPage();
      const sess = API.auth.requireAuth();
      if (!sess) return;

      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = 'history.html'; return; }

      txnData = await API.txn.getById(id);
      if (!txnData) { UI.toast('Không tìm thấy đơn hàng!', 'error'); return; }

      // Check đã đánh giá chưa
      if (txnData.status === 'done') {
        hasReview = await API.review.hasReview(id);
      }

      const svc = await API.svc.getById(txnData.serviceId).catch(() => null);
      renderDetail(svc, sess);
    });

    function getStatusBanner(o) {
      if (o.status === 'pending') return `
        <div class="status-banner waiting">
          <i class="ri-time-line" style="font-size:1.1rem;flex-shrink:0"></i>
          <div><strong>Đang chờ nhà cung cấp xem xét</strong><br>
          Nhà cung cấp sẽ phản hồi trong thời gian sớm nhất.</div>
        </div>`;
      if (o.status === 'confirmed') return `
        <div class="status-banner confirmed">
          <i class="ri-checkbox-circle-line" style="font-size:1.1rem;flex-shrink:0"></i>
          <div><strong>Nhà cung cấp đã xác nhận!</strong><br>
          Sau khi dịch vụ hoàn tất, hãy nhấn "Hoàn Thành" để xác nhận và đánh giá.</div>
        </div>`;
      if (o.status === 'cancelled') return `
        <div class="status-banner cancelled">
          <i class="ri-close-circle-line" style="font-size:1.1rem;flex-shrink:0"></i>
          <div><strong>Đơn hàng đã bị từ chối${o.cancelReason ? '' : ' / huỷ'}</strong>
          ${o.cancelReason ? `<br>Lý do: <em>${o.cancelReason}</em>` : ''}</div>
        </div>`;
      if (o.status === 'done') return `
        <div class="status-banner done">
          <i class="ri-medal-line" style="font-size:1.1rem;flex-shrink:0"></i>
          <div><strong>Đơn hàng đã hoàn thành!</strong><br>
          ${hasReview ? 'Bạn đã đánh giá dịch vụ này. Cảm ơn bạn!' : 'Hãy đánh giá để giúp những khách hàng khác nhé!'}</div>
        </div>`;
      return '';
    }

    function renderDetail(svc, sess) {
      document.getElementById('checkout-content').innerHTML = `
        <div class="detail-layout">
          <div>
            ${getStatusBanner(txnData)}

            <!-- Thông tin dịch vụ -->
            <div class="section-card animate-fadeInUp">
              <div class="section-card-title"><i class="ri-store-2-line" style="color:var(--gold)"></i> Thông Tin Dịch Vụ</div>
              <div style="display:flex;gap:var(--sp-lg);align-items:flex-start;flex-wrap:wrap">
                <img src="${svc?.image ? (svc.image.startsWith('http') ? svc.image : rootPath() + svc.image) : 'https://placehold.co/120x90?text=BêTráp'}"
                     alt="${txnData.serviceName}"
                     style="width:120px;height:90px;object-fit:cover;border-radius:var(--r-md);flex-shrink:0"
                     onerror="this.src='https://placehold.co/120x90?text=BêTráp'">
                <div style="flex:1">
                  <div style="font-weight:700;font-size:1.1rem">${txnData.serviceName}</div>
                  <div style="font-size:.8rem;color:var(--text-muted);margin-top:4px">Nhà cung cấp: <strong>${svc?.providerName || '—'}</strong></div>
                  ${svc?.location ? `<div style="font-size:.8rem;color:var(--text-muted);margin-top:2px"><i class="ri-map-pin-line"></i> ${svc.location}</div>` : ''}
                </div>
                <div style="flex-shrink:0">${UI.statusBadge(txnData.status)}</div>
              </div>
            </div>

            <!-- Chi tiết lịch hẹn -->
            <div class="section-card animate-fadeInUp delay-100">
              <div class="section-card-title"><i class="ri-calendar-event-line" style="color:var(--gold)"></i> Chi Tiết Lịch Hẹn</div>
              <div class="info-row"><span class="label">Ngày thực hiện</span><span class="val">${txnData.date || '—'}</span></div>
              <div class="info-row"><span class="label">Giờ</span><span class="val">${txnData.time || '—'}</span></div>
              <div class="info-row"><span class="label">Địa điểm</span><span class="val">${txnData.address || '—'}</span></div>
              ${txnData.note ? `<div class="info-row"><span class="label">Ghi chú</span><span class="val">${txnData.note}</span></div>` : ''}
              <div class="info-row"><span class="label">Ngày đặt</span><span class="val">${UI.formatDate(txnData.createdAt)}</span></div>
            </div>

            <!-- Hành động cho customer -->
            ${sess.role === 'customer' ? `
            <div class="section-card animate-fadeInUp delay-200">
              <div class="section-card-title"><i class="ri-settings-3-line" style="color:var(--gold)"></i> Hành Động</div>
              <div style="display:flex;gap:var(--sp-md);flex-wrap:wrap">
                ${txnData.status === 'confirmed' ? `
                  <button class="btn btn-primary" onclick="markDone()">
                    <i class="ri-check-double-line"></i> Hoàn Thành & Đánh Giá
                  </button>` : ''}
                ${txnData.status === 'done' && !hasReview ? `
                  <button class="btn btn-gold" onclick="openReview()">
                    <i class="ri-star-line"></i> Đánh Giá & Nhận Xét
                  </button>` : ''}
                ${txnData.status === 'done' && hasReview ? `
                  <div style="color:var(--success);font-weight:600"><i class="ri-star-fill"></i> Đã đánh giá dịch vụ</div>` : ''}
                ${txnData.status === 'pending' ? `
                  <button class="btn btn-danger btn-sm" onclick="cancelOrder()">
                    <i class="ri-close-line"></i> Huỷ Đơn Hàng
                  </button>` : ''}
                <a href="history.html" class="btn btn-ghost"><i class="ri-arrow-left-line"></i> Quay Lại</a>
              </div>
            </div>` : ''}
          </div>

          <!-- Side summary -->
          <div>
            <div class="side-card animate-fadeInRight">
              <h4 style="margin-bottom:var(--sp-lg)">Tóm Tắt Đơn Hàng</h4>
              <div class="info-row"><span class="label">Mã đơn</span><span class="val order-id" style="font-size:.75rem">${txnData.id}</span></div>
              <div class="info-row"><span class="label">Dịch vụ</span><span class="val" style="font-size:.8rem">${txnData.serviceName}</span></div>
              <div class="info-row"><span class="label">Ngày</span><span class="val">${txnData.date || '—'}</span></div>
              <div class="info-row"><span class="label">Trạng thái</span><span class="val">${UI.statusBadge(txnData.status)}</span></div>
              <div style="border-top:2px solid rgba(220,165,174,.1);margin-top:var(--sp-md);padding-top:var(--sp-md);display:flex;justify-content:space-between;align-items:center">
                <span style="font-weight:700">Tổng cộng</span>
                <span style="font-family:var(--font-h);font-size:1.4rem;font-weight:800;color:var(--gold)">${UI.formatCurrency(txnData.price)}</span>
              </div>
              <div class="divider"></div>
              <a href="history.html" class="btn btn-ghost btn-block" style="text-align:center">
                <i class="ri-list-check"></i> Xem tất cả đơn hàng
              </a>
            </div>
          </div>
        </div>`;
    }

    // ── Hoàn Thành & Đánh Giá ────────────────────────────────────────────────
    function markDone() {
      reviewRating = 5;
      UI.modal({
        title: '⭐ Xác Nhận Hoàn Thành & Đánh Giá',
        body: `
          <p style="color:var(--text-muted);margin-bottom:var(--sp-lg)">Đơn hàng đã thực hiện xong! Bạn cảm thấy thế nào về dịch vụ này?</p>
          <div class="star-picker" id="star-picker">
            ${[1,2,3,4,5].map(i=>`<span class="star-btn active" data-val="${i}" onclick="setRating(${i})">★</span>`).join('')}
          </div>
          <div id="rating-label" style="margin-top:var(--sp-sm);color:var(--gold);font-weight:600">Xuất sắc</div>
          <div class="form-group mt-lg">
            <label class="form-label">Nhận xét của bạn (Không bắt buộc)</label>
            <textarea id="review-comment" class="form-control" rows="4" placeholder="Chia sẻ trải nghiệm của bạn..."></textarea>
          </div>`,
        confirmText: 'Hoàn Thành & Gửi Đánh Giá',
        confirmClass: 'btn-gold',
        onConfirm: async () => {
          const comment = document.getElementById('review-comment').value;
          try {
            await API.txn.updateStatus(txnData.id, 'done');
            await API.review.create({ serviceId: txnData.serviceId, transactionId: txnData.id, rating: reviewRating, comment });
            UI.toast('🎉 Đơn hàng đã hoàn thành! Cảm ơn bạn đã đánh giá.', 'success');
            txnData.status = 'done';
            hasReview = true;
            const svc = await API.svc.getById(txnData.serviceId).catch(() => null);
            const sess = API.auth.currentSession();
            renderDetail(svc, sess);
          } catch(e) {
            UI.toast(e.message, 'error');
            return false;
          }
        }
      });
    }

    // ── Huỷ Đơn ──────────────────────────────────────────────────────────────
    async function cancelOrder() {
      UI.modal({
        title: 'Huỷ Đơn Hàng?',
        body: '<p>Bạn có chắc muốn huỷ đơn hàng này? Hành động không thể hoàn tác.</p>',
        confirmText: 'Xác nhận huỷ',
        confirmClass: 'btn-danger',
        onConfirm: async () => {
          await API.txn.updateStatus(txnData.id, 'cancelled');
          UI.toast('Đã huỷ đơn hàng!', 'info');
          location.href = 'history.html';
        }
      });
    }

    // ── Đánh Giá ─────────────────────────────────────────────────────────────
    function openReview() {
      reviewRating = 5;
      UI.modal({
        title: '⭐ Đánh Giá & Nhận Xét Dịch Vụ',
        body: `
          <p style="color:var(--text-muted);margin-bottom:var(--sp-lg)">Bạn cảm thấy thế nào về dịch vụ này?</p>
          <div class="star-picker" id="star-picker">
            ${[1,2,3,4,5].map(i=>`<span class="star-btn active" data-val="${i}" onclick="setRating(${i})">★</span>`).join('')}
          </div>
          <div id="rating-label" style="margin-top:var(--sp-sm);color:var(--gold);font-weight:600">Xuất sắc</div>
          <div class="form-group mt-lg">
            <label class="form-label">Nhận xét của bạn</label>
            <textarea id="review-comment" class="form-control" rows="4" placeholder="Chia sẻ trải nghiệm của bạn..."></textarea>
          </div>`,
        confirmText: 'Gửi Đánh Giá',
        confirmClass: 'btn-gold',
        onConfirm: async () => {
          const comment = document.getElementById('review-comment').value;
          try {
            await API.review.create({ serviceId: txnData.serviceId, transactionId: txnData.id, rating: reviewRating, comment });
            UI.toast('Cảm ơn bạn đã đánh giá! ⭐', 'success');
            hasReview = true;
            const svc = await API.svc.getById(txnData.serviceId).catch(() => null);
            const sess = API.auth.currentSession();
            renderDetail(svc, sess);
          } catch(e) { UI.toast(e.message, 'error'); }
        }
      });
    }

    function setRating(val) {
      reviewRating = val;
      document.querySelectorAll('.star-btn').forEach(s => {
        s.classList.toggle('active', +s.dataset.val <= val);
      });
      const labels = ['', 'Tệ', 'Chưa tốt', 'Bình thường', 'Tốt', 'Xuất sắc'];
      const lbl = document.getElementById('rating-label');
      if (lbl) lbl.textContent = labels[val];
    }
  </script>
</body>
</html>
