<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Dịch Vụ — BêTráp</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    .services-layout{display:grid;grid-template-columns:260px 1fr;gap:var(--sp-2xl);padding:var(--sp-xl) 0}
    .filter-sidebar{background:white;border-radius:var(--r-lg);padding:var(--sp-xl);box-shadow:var(--shadow-md);position:sticky;top:calc(var(--nav-h) + var(--sp-lg));height:fit-content;border:1px solid rgba(0,0,0,.03)}
    .filter-section{margin-bottom:var(--sp-lg)}
    .filter-title{font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--sp-md)}
    .services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
    .search-bar{display:flex;gap:var(--sp-md);margin-bottom:var(--sp-lg)}
    .search-input{flex:1;padding:12px 18px;border:1.5px solid rgba(220,165,174,.15);border-radius:var(--r-full);font-size:.9rem;outline:none;transition:border-color var(--t-fast)}
    .search-input:focus{border-color:var(--gold)}
    .price-inputs{display:flex;gap:var(--sp-sm);align-items:center}
    .price-input{width:100%;padding:8px 12px;border:1.5px solid rgba(220,165,174,.15);border-radius:var(--r-sm);font-size:.8rem;outline:none}
    .price-input:focus{border-color:var(--gold)}
    .result-count{font-size:.875rem;color:var(--text-muted);margin-bottom:var(--sp-md)}
    @media(max-width:1024px){.services-layout{grid-template-columns:1fr}.filter-sidebar{display:none}.services-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){.services-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-header" data-aos="fade-down">
    <div class="container">
      <h1>Tìm Dịch Vụ</h1>
      <p>Hàng trăm dịch vụ đám hỏi uy tín trên toàn quốc</p>
    </div>
  </div>

  <div class="container page-content" style="padding-top:0">
    <!-- Mobile filter chips -->
    <div class="filter-bar" id="mobile-cats">
      <button class="filter-chip" data-cat="be-trap">Bê Tráp</button>
      <button class="filter-chip" data-cat="ao-dai">Áo Dài</button>
      <button class="filter-chip" data-cat="lam-trap">Làm Tráp</button>
      <button class="filter-chip" data-cat="media">Media</button>
      <button class="filter-chip" data-cat="mc">MC Sự Kiện</button>
    </div>

    <div class="services-layout">
      <!-- Sidebar Filters -->
      <aside class="filter-sidebar" data-aos="fade-right" data-aos-delay="100">
        <h4 style="margin-bottom:var(--sp-lg)">Bộ Lọc</h4>
        <div class="filter-section">
          <div class="filter-title">Danh Mục</div>
          <div style="display:flex;flex-direction:column;gap:var(--sp-sm)">
            <label style="display:flex;align-items:center;gap:var(--sp-sm);font-size:.875rem;cursor:pointer"><input type="radio" name="cat" value="be-trap" checked> Bê Tráp</label>
            <label style="display:flex;align-items:center;gap:var(--sp-sm);font-size:.875rem;cursor:pointer"><input type="radio" name="cat" value="ao-dai"> Áo Dài</label>
            <label style="display:flex;align-items:center;gap:var(--sp-sm);font-size:.875rem;cursor:pointer"><input type="radio" name="cat" value="lam-trap"> Làm Tráp</label>
            <label style="display:flex;align-items:center;gap:var(--sp-sm);font-size:.875rem;cursor:pointer"><input type="radio" name="cat" value="media"> Media</label>
            <label style="display:flex;align-items:center;gap:var(--sp-sm);font-size:.875rem;cursor:pointer"><input type="radio" name="cat" value="mc"> MC Sự Kiện</label>
          </div>
        </div>
        <div class="filter-section">
          <div class="filter-title">Khu Vực</div>
          <select id="location-filter" class="form-control" style="font-size:.875rem;padding:10px 14px">
            <option value="">Tất cả khu vực</option>
            <option>Hà Nội</option><option>TP. HCM</option><option>Đà Nẵng</option>
            <option>Hải Phòng</option><option>Huế</option>
          </select>
        </div>
        <button class="btn btn-primary btn-block" onclick="applyFilters()">Áp Dụng</button>
        <button class="btn btn-ghost btn-block mt-sm" onclick="resetFilters()">Đặt Lại</button>
      </aside>

      <!-- Results -->
      <div data-aos="fade-left" data-aos-delay="200">
        <div class="search-bar">
          <input id="search-input" type="text" class="search-input" placeholder="🔍 Tìm tên dịch vụ, mô tả...">
          <button class="btn btn-primary" onclick="applyFilters()"><i class="ri-search-line"></i></button>
        </div>
        <div class="result-count" id="result-count"></div>
        <div class="services-grid stagger-children" id="services-grid"></div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>
  <div id="toast-container"></div>
  
  <!-- Notice Overlay -->
  <div id="notice-overlay" style="position:fixed;inset:0;z-index:9999;background:rgba(20,15,15,0.6);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:var(--sp-lg);opacity:1;transition:opacity .4s ease;">
    <div style="background:#fffefc;border-radius:24px;padding:var(--sp-2xl);max-width:460px;width:100%;position:relative;box-shadow:0 30px 60px rgba(0,0,0,0.15);transform:translateY(0);animation:fadeInUp .5s ease;">
      <button onclick="closeNotice()" style="position:absolute;top:20px;right:20px;background:none;border:none;font-size:1.5rem;color:var(--text-muted);cursor:pointer;transition:color 0.2s;"><i class="ri-close-line"></i></button>
      <h2 style="font-family:var(--font-h);color:#8a6a5c;font-size:1.8rem;margin-bottom:var(--sp-xl)">Lưu ý khi đặt lịch</h2>
      <div style="display:flex;flex-direction:column;gap:var(--sp-lg);">
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <i class="ri-checkbox-circle-line" style="color:#d8aba5;font-size:1.5rem;margin-top:-2px"></i>
          <span style="color:#776d68;font-size:1.05rem;line-height:1.5;font-weight:500">Đặt lịch trước ít nhất 1 tháng để được tư vấn tốt nhất</span>
        </div>
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <i class="ri-checkbox-circle-line" style="color:#d8aba5;font-size:1.5rem;margin-top:-2px"></i>
          <span style="color:#776d68;font-size:1.05rem;line-height:1.5;font-weight:500">Cọc 30% để giữ chỗ đội bê tráp</span>
        </div>
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <i class="ri-checkbox-circle-line" style="color:#d8aba5;font-size:1.5rem;margin-top:-2px"></i>
          <span style="color:#776d68;font-size:1.05rem;line-height:1.5;font-weight:500">Tư vấn miễn phí qua điện thoại hoặc trực tiếp</span>
        </div>
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <i class="ri-checkbox-circle-line" style="color:#d8aba5;font-size:1.5rem;margin-top:-2px"></i>
          <span style="color:#776d68;font-size:1.05rem;line-height:1.5;font-weight:500">Báo giá chi tiết trong vòng 24 giờ</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/db.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      UI.initPage();
      UI.renderFooter('footer-container');

      window.closeNotice = function() {
        const el = document.getElementById('notice-overlay');
        if(el) {
          el.style.opacity = '0';
          el.style.pointerEvents = 'none';
          setTimeout(() => el.remove(), 400);
        }
      };

      // Read URL param
      const cat = new URLSearchParams(location.search).get('cat') || 'be-trap';
      if (cat) {
        const radio = document.querySelector(`input[name="cat"][value="${cat}"]`);
        if (radio) radio.checked = true;
        const chip = document.querySelector(`[data-cat="${cat}"]`);
        if (chip) { document.querySelectorAll('[data-cat]').forEach(c=>c.classList.remove('active')); chip.classList.add('active'); }
      }

      // Mobile chips
      document.querySelectorAll('[data-cat]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('[data-cat]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          const r = document.querySelector(`input[name="cat"][value="${btn.dataset.cat}"]`);
          if (r) r.checked = true;
          applyFilters();
        });
      });

      // Sidebar radio
      document.querySelectorAll('input[name="cat"]').forEach(r => r.addEventListener('change', applyFilters));
      document.getElementById('location-filter').addEventListener('change', applyFilters);
      document.getElementById('search-input').addEventListener('input', debounce(applyFilters, 400));

      applyFilters();
    });

    let lastCat = null;

    async function applyFilters() {
      const cat      = document.querySelector('input[name="cat"]:checked')?.value || '';
      const location = document.getElementById('location-filter').value;
      const sort     = 'rating';
      const search   = document.getElementById('search-input').value;
      
      showCategoryModal(cat);

      const svcs = await API.svc.getAll({ category:cat, location, sort, search });
      renderServices(svcs);
    }

    function showCategoryModal(cat) {
      if (cat === lastCat) return; // Only show when category changes
      lastCat = cat;

      if (cat === 'be-trap') {
        if (typeof closeNotice === 'function') closeNotice();
        UI.modal({
          title: 'Đội Bê Tráp',
          body: '<div style="line-height:1.6;font-size:.95rem;color:var(--text-dark);text-align:justify">Đội bê tráp chuyên nghiệp với phong cách trẻ trung, lịch sự và chỉn chu trong từng nghi thức cưới hỏi. Nam mặc quần âu, giày tây lịch lãm; nữ duyên dáng với áo dài nhiều mẫu đẹp, đi giày bệt hoặc cao gót theo yêu cầu concept của khách hàng.<br><br>Đội hình được sắp xếp đồng đều, tác phong chuyên nghiệp, đúng giờ và hỗ trợ tận tâm trong suốt buổi lễ. Không chỉ bê tráp, đội còn hỗ trợ rót nước, mời khách và phối hợp nghi lễ để ngày vui diễn ra trọn vẹn, trang trọng và mang đậm nét đẹp truyền thống Việt Nam.</div>',
          confirmText: 'Đã hiểu'
        });
      } else if (cat === 'ao-dai') {
        if (typeof closeNotice === 'function') closeNotice();
        UI.modal({
          title: 'Thuê Áo Dài',
          body: '<div style="line-height:1.6;font-size:.95rem;color:var(--text-dark);text-align:justify">Cho thuê áo dài dành cho đội bê trap với nhiều mẫu mã đa dạng, từ truyền thống đến hiện đại, phù hợp cho lễ ăn hỏi, cưới hỏi và các sự kiện đặc biệt. Áo dài được chuẩn bị sạch sẽ, chỉn chu, chất liệu đẹp và lên form tôn dáng, giúp đội hình đồng đều và nổi bật trong ngày lễ.<br><br>Có nhiều tone màu và concept để lựa chọn. Trang phục dành cho cả nam và nữ, dễ phối phụ kiện và phù hợp với nhiều phong cách nghi lễ Việt Nam. Cam kết chuẩn bị đúng mẫu, đúng size và đúng thời gian để mang đến hình ảnh chuyên nghiệp và đẹp mắt cho ngày vui của khách hàng.</div>',
          confirmText: 'Đã hiểu'
        });
      }
    }

    function renderServices(svcs) {
      const grid = document.getElementById('services-grid');
      document.getElementById('result-count').textContent = `Tìm thấy ${svcs.length} dịch vụ`;
      if (!svcs.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1; text-align:center; padding: 40px 20px; background: white; border-radius: var(--r-lg); box-shadow: var(--shadow-sm);">
            <div class="empty-icon" style="font-size: 3rem; margin-bottom: 10px;">📦</div>
            <h3 style="font-family: var(--font-h); color: var(--text-dark); margin-bottom: 8px;">Hiện tại chưa có dịch vụ nào</h3>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px;">Danh mục này đang được chúng tôi cập nhật dữ liệu. Vui lòng quay lại sau nhé!</p>
            <button class="btn btn-primary" onclick="resetFilters()">Xem tất cả dịch vụ khác</button>
          </div>`;
        return;
      }
      grid.innerHTML = svcs.map(s => `
        <a href="service-detail.html?id=${s.id}" class="service-card">
          <div style="overflow:hidden;height:200px">
            <img src="${s.image.startsWith('http') ? s.image : rootPath() + s.image}" alt="${s.name}" style="width:100%;height:100%;object-fit:cover;transition:transform .4s ease">
          </div>
          <div class="service-card-body">
            <span style="font-size:.72rem;font-weight:700;color:var(--gold);letter-spacing:.08em;text-transform:uppercase">${UI.categoryIcon(s.category)} ${UI.categoryLabel(s.category)}</span>
            <div class="service-card-title mt-xs">${s.name}</div>
            <div class="service-card-provider"><i class="ri-map-pin-line"></i> ${s.location} · ${s.providerName || API.svc.getProviderName(s.providerId)}</div>
            <div class="stars">${UI.stars(s.rating)} <span style="font-size:.75rem;color:var(--text-muted)">(${s.reviewCount})</span></div>
            <div class="service-card-footer">
              <span class="btn btn-primary btn-sm">Xem chi tiết</span>
            </div>
          </div>
        </a>`).join('');
    }

    function resetFilters() {
      const defaultRadio = document.querySelector('input[name="cat"][value="be-trap"]');
      if (defaultRadio) defaultRadio.checked = true;
      document.querySelectorAll('[data-cat]').forEach(c=>c.classList.remove('active'));
      const defaultChip = document.querySelector('[data-cat="be-trap"]');
      if (defaultChip) defaultChip.classList.add('active');
      document.getElementById('location-filter').value = '';
      document.getElementById('search-input').value = '';
      applyFilters();
    }

    function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
  </script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({duration:800, once:true});</script>
</body>
</html>
