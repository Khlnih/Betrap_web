<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Nhật Ký BêTráp — Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css?v=1.6">
  <link rel="stylesheet" href="../css/components.css?v=1.6">
  <style>
    /* Rain Effect */
    #rain-canvas {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.6;
    }
    .page-header {
      background: var(--grad-hero);
      padding: calc(var(--nav-h) + var(--sp-2xl)) 0 var(--sp-2xl);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    /* Timeline styles */
    .timeline {
      position: relative;
      max-width: 1000px;
      margin: 0 auto;
      padding: var(--sp-2xl) 0;
    }
    .timeline::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 16px;
      width: 2px;
      background: linear-gradient(to bottom, var(--gold), transparent);
    }
    .timeline-month {
      position: relative;
      padding-left: 56px;
      margin-bottom: 60px;
    }
    .timeline-month-label {
      position: relative;
      font-family: var(--font-h);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: var(--sp-xl);
      display: inline-block;
    }
    .timeline-month-label::before {
      content: '';
      position: absolute;
      left: -46px; top: 8px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold);
      border: 3px solid white;
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.2);
    }
    .timeline-month.empty .timeline-month-label {
      color: var(--text-muted);
      font-size: 1.2rem;
      font-family: var(--font);
      font-weight: 500;
      margin-bottom: 0;
    }
    .timeline-month.empty .timeline-month-label::before {
      background: var(--text-muted);
      box-shadow: none;
      width: 10px; height: 10px;
      left: -44px; top: 8px;
    }
    
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
    }

    .blog-card {
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: var(--r-xl);
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid rgba(212, 185, 150, 0.1);
      text-decoration: none;
      color: inherit;
    }
    .blog-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 40px rgba(212, 175, 55, 0.15);
      border-color: rgba(212,175,55,.4);
    }
    .blog-card-img-wrap {
      width: 100%;
      height: 240px;
      overflow: hidden;
      background: var(--cream);
      position: relative;
    }
    .blog-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .blog-card:hover .blog-card-img {
      transform: scale(1.08);
    }
    .blog-card-content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .blog-card-title {
      font-family: var(--font-h);
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 16px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .blog-card-meta {
      font-size: 0.9rem;
      color: var(--gold-dark);
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      margin-top: auto;
    }
    .read-more-text {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: gap 0.3s;
    }
    .blog-card:hover .read-more-text {
      gap: 10px;
    }
    
    @media (max-width: 800px) {
      .blog-grid { grid-template-columns: 1fr; }
    }
    
    .load-more {
      text-align: center;
      margin-top: var(--sp-xl);
    }
  </style>
</head>
<body>
  <div id="nav-container"></div>

  <div class="page-header">
    <canvas id="rain-canvas"></canvas>
    <div class="container" style="position:relative; z-index:2">
      <h1 class="font-billgates" style="font-size: clamp(3rem, 6vw, 4.5rem); color: var(--gold-dark);">Nhật Ký BêTráp</h1>
      <p style="font-size: 1.1rem; max-width: 600px; margin: 16px auto 0;">Chuyện nghề, chuyện đời và những khoảnh khắc đẹp nhất trong các nghi lễ cưới hỏi truyền thống Việt Nam.</p>
    </div>
  </div>

  <div class="container" style="margin-top:-24px; position:relative; z-index:10; text-align:center; padding-bottom: 24px;">
    <div style="max-width:600px; margin:0 auto; background:white; padding:8px; border-radius:100px; box-shadow:var(--shadow-md); display:flex; align-items:center;">
      <i class="ri-search-line" style="margin-left:16px; color:var(--text-muted);"></i>
      <input type="text" id="blog-search" placeholder="Tìm kiếm bài viết..." style="border:none; padding:12px; width:100%; outline:none; border-radius:100px; font-size:1rem;" onkeypress="if(event.key==='Enter') doSearch()">
      <button class="btn btn-primary" style="border-radius:100px; padding:10px 24px;" onclick="doSearch()">Tìm kiếm</button>
    </div>
  </div>

  <div class="container page-content">
    <div class="timeline" id="blog-timeline">
      <!-- Mẫu skeleton khi đang load -->
      <div style="text-align:center; padding: 40px;"><div class="spinner"></div></div>
    </div>
    
    <div class="load-more" id="load-more-container" style="display: none;">
      <button class="btn btn-outline" onclick="loadMoreMonths()">Xem thêm <i class="ri-arrow-down-line"></i></button>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="../js/api.js?v=1.1"></script>
  <script src="../js/ui.js?v=1.2"></script>
  <script>
    let currentOffset = 0;
    
    document.addEventListener('DOMContentLoaded', async () => {
      UI.initPage();
      UI.renderFooter('footer-container');
      initRainEffect();
      await loadBlogs();
    });

    async function loadBlogs(isLoadMore = false) {
      const timelineEl = document.getElementById('blog-timeline');
      const loadMoreEl = document.getElementById('load-more-container');
      
      if (!isLoadMore) timelineEl.innerHTML = '';
      
      try {
        const months = await API.blog.getMonths(currentOffset);
        
        if (months.length === 0) {
          if (!isLoadMore) {
            timelineEl.innerHTML = '<div class="empty-state"><i class="ri-article-line empty-icon"></i><h3>Chưa có bài viết nào</h3></div>';
          }
          loadMoreEl.style.display = 'none';
          return;
        }

        // Tạo 5 tháng hiển thị, nếu DB trả ít hơn thì chỉ hiện bấy nhiêu.
        // Có thể lấp đầy các tháng trống ở giữa nếu cần, nhưng DB trả về các tháng CÓ bài.
        // Theo yêu cầu: nếu có tháng trống giữa các tháng có bài, thì hiện dòng trống.
        // Ở đây mình lấy tháng đầu và cuối của mảng months, duyệt tuần tự để điền các tháng trống.
        
        let html = '';
        const startYear = months[0].year;
        const startMonth = months[0].month;
        const endYear = months[months.length - 1].year;
        const endMonth = months[months.length - 1].month;
        
        let currY = startYear, currM = startMonth;
        
        while (currY > endYear || (currY === endYear && currM >= endMonth)) {
          // Kiểm tra xem tháng này có bài không
          const hasBlog = months.find(m => m.year === currY && m.month === currM);
          
          if (hasBlog) {
            // Có bài -> gọi API lấy bài của tháng này
            const blogs = await API.blog.getByMonth(currY, currM);
            let blogsHtml = blogs.map(b => `
              <a href="blog-detail.html?id=${b.Slug || b.Id}" class="blog-card">
                <div class="blog-card-img-wrap">
                  ${b.CoverImage ? `<img src="${b.CoverImage}" class="blog-card-img" alt="Cover">` : '<div class="blog-card-img" style="display:flex;align-items:center;justify-content:center;font-size:3rem;color:#ddd"><i class="ri-image-line"></i></div>'}
                </div>
                <div class="blog-card-content">
                  <div class="blog-card-title">${b.Title}</div>
                  <div class="blog-card-meta">
                    <i class="ri-calendar-line"></i> ${UI.formatDate(b.PublishedAt)}
                  </div>
                  <div class="read-more-text">Đọc bài viết <i class="ri-arrow-right-line"></i></div>
                </div>
              </a>
            `).join('');
            
            html += `
              <div class="timeline-month">
                <div class="timeline-month-label">Tháng ${currM}/${currY}</div>
                <div class="blog-grid">
                  ${blogsHtml}
                </div>
              </div>
            `;
          } else {
            // Không có bài -> dòng trống
            html += `
              <div class="timeline-month empty">
                <div class="timeline-month-label">Tháng ${currM}/${currY} — Chưa có bài viết nào</div>
              </div>
            `;
          }
          
          // Lùi 1 tháng
          currM--;
          if (currM === 0) {
            currM = 12;
            currY--;
          }
        }
        
        if (isLoadMore) {
          timelineEl.insertAdjacentHTML('beforeend', html);
        } else {
          timelineEl.innerHTML = html;
        }
        
        // Nếu load đủ 5 tháng, có thể có thêm, hiện nút Xem thêm
        if (months.length === 5) {
          loadMoreEl.style.display = 'block';
          currentOffset += 5;
        } else {
          loadMoreEl.style.display = 'none';
        }
        
      } catch(e) {
        if (!isLoadMore) timelineEl.innerHTML = '<div class="text-center text-error mt-lg">Lỗi tải dữ liệu. Vui lòng thử lại sau.</div>';
      }
    }

    function loadMoreMonths() {
      const btn = document.querySelector('#load-more-container .btn');
      btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;display:inline-block"></span>';
      loadBlogs(true).then(() => {
        btn.innerHTML = 'Xem thêm <i class="ri-arrow-down-line"></i>';
      });
    }

    async function doSearch() {
      const val = document.getElementById('blog-search').value.trim();
      const timelineEl = document.getElementById('blog-timeline');
      const loadMoreEl = document.getElementById('load-more-container');
      
      if (!val) {
        currentOffset = 0;
        await loadBlogs(false);
        return;
      }
      
      timelineEl.innerHTML = '<div style="text-align:center; padding: 40px;"><div class="spinner"></div></div>';
      loadMoreEl.style.display = 'none';
      
      try {
        const blogs = await API.blog.getAll(null, null, val);
        if (!blogs.length) {
          timelineEl.innerHTML = '<div class="empty-state"><i class="ri-search-line empty-icon"></i><h3>Không tìm thấy bài viết nào</h3><p>Vui lòng thử từ khóa khác.</p></div>';
          return;
        }
        
        let html = '<div class="timeline-month"><div class="timeline-month-label">Kết quả tìm kiếm cho: "' + val + '"</div>';
        html += '<div class="blog-grid">';
        html += blogs.map(b => `
          <a href="blog-detail.html?id=${b.Slug || b.Id}" class="blog-card">
            <div class="blog-card-img-wrap">
              ${b.CoverImage ? `<img src="${b.CoverImage}" class="blog-card-img" alt="Cover">` : '<div class="blog-card-img" style="display:flex;align-items:center;justify-content:center;font-size:3rem;color:#ddd"><i class="ri-image-line"></i></div>'}
            </div>
            <div class="blog-card-content">
              <div class="blog-card-title">${b.Title}</div>
              <div class="blog-card-meta">
                <i class="ri-calendar-line"></i> ${UI.formatDate(b.PublishedAt)}
              </div>
              <div class="read-more-text">Đọc bài viết <i class="ri-arrow-right-line"></i></div>
            </div>
          </a>
        `).join('');
        html += '</div></div>';
        
        timelineEl.innerHTML = html;
      } catch(e) {
        timelineEl.innerHTML = '<div class="text-center text-error mt-lg">Lỗi tìm kiếm. Vui lòng thử lại sau.</div>';
      }
    }

    // Hiệu ứng mưa canvas
    function initRainEffect() {
      const canvas = document.getElementById('rain-canvas');
      const ctx = canvas.getContext('2d');
      let w = canvas.width = window.innerWidth;
      let h = canvas.height = document.querySelector('.page-header').offsetHeight;
      
      window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = document.querySelector('.page-header').offsetHeight;
      });

      const particles = [];
      const numRaindrops = 80;

      for (let i = 0; i < numRaindrops; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          l: Math.random() * 1, // độ dài vệt mưa
          xs: -4 + Math.random() * 4 + 2, // tốc độ x
          ys: Math.random() * 10 + 10 // tốc độ rơi y
        });
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        ctx.strokeStyle = 'rgba(212, 185, 150, 0.4)'; // màu vàng gold nhạt
        ctx.lineWidth = 1;
        ctx.lineCap = 'round';

        for (let i = 0; i < particles.length; i++) {
          let p = particles[i];
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x + p.l * p.xs, p.y + p.l * p.ys);
          ctx.stroke();
        }
        move();
        requestAnimationFrame(draw);
      }

      function move() {
        for (let i = 0; i < particles.length; i++) {
          let p = particles[i];
          p.x += p.xs;
          p.y += p.ys;
          if (p.x > w || p.y > h) {
            p.x = Math.random() * w;
            p.y = -20;
          }
        }
      }
      draw();
    }
  </script>
</body>
</html>
