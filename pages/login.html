<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Đăng Nhập — BêTráp</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <style>
    body{background:var(--grad-hero);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--sp-lg)}
    .auth-wrap{display:grid;grid-template-columns:1fr 1fr;width:100%;max-width:960px;border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--shadow-lg)}
    .auth-left{background:var(--grad-primary);padding:var(--sp-2xl);display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
    .auth-left::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:rgba(255,255,255,.08);border-radius:50%}
    .auth-left::after{content:'';position:absolute;bottom:-60px;left:-60px;width:250px;height:250px;background:rgba(0,0,0,.08);border-radius:50%}
    .auth-left h2{font-size:2rem;color:white;position:relative;line-height:1.3}
    .auth-left p{color:rgba(255,255,255,.75);position:relative;line-height:1.8;margin-top:var(--sp-md)}
    .auth-features{display:flex;flex-direction:column;gap:var(--sp-md);position:relative}
    .auth-feature{display:flex;align-items:center;gap:var(--sp-md);color:rgba(255,255,255,.85);font-size:.875rem}
    .auth-feature i{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .auth-right{background:white;padding:var(--sp-2xl)}
    .auth-title{font-family:var(--font-h);font-size:1.8rem;font-weight:700;color:var(--text-dark);margin-bottom:var(--sp-xs)}
    .auth-sub{color:var(--text-muted);font-size:.875rem;margin-bottom:var(--sp-xl)}
    @media(max-width:768px){.auth-wrap{grid-template-columns:1fr}.auth-left{display:none}}
  </style>
</head>
<body>
  <a href="../index.html" style="position:fixed;top:20px;left:20px;color:var(--gold-light);font-size:.875rem;display:flex;align-items:center;gap:6px;z-index:10">
    <i class="ri-arrow-left-line"></i> Về trang chủ
  </a>

  <div class="auth-wrap animate-scaleIn">
    <div class="auth-left">
      <div>
        <div class="navbar-brand" style="color:white;font-size:1.6rem;margin-bottom:var(--sp-xl)">
          <div class="brand-icon">🎀</div> BêTráp
        </div>
        <h2>Chào mừng trở lại!</h2>
        <p>Đăng nhập để đặt dịch vụ đám hỏi truyền thống nhanh chóng và tiện lợi.</p>
      </div>
      <div class="auth-features">
        <div class="auth-feature"><i class="ri-shield-check-line"></i><span>Thanh toán an toàn, bảo mật</span></div>
        <div class="auth-feature"><i class="ri-message-3-line"></i><span>Chat trực tiếp với nhà cung cấp</span></div>
        <div class="auth-feature"><i class="ri-star-line"></i><span>Dịch vụ được xác thực uy tín</span></div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-title">Đăng Nhập</div>
      <p class="auth-sub">Chưa có tài khoản? <a href="register.html" style="color:var(--gold-light);font-weight:600">Đăng ký ngay</a></p>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-group">
            <i class="ri-mail-line input-icon" style="color:var(--text-muted)"></i>
            <input id="email" type="email" class="form-control" placeholder="email@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <div class="input-group">
            <i class="ri-lock-line input-icon" style="color:var(--text-muted)"></i>
            <input id="password" type="password" class="form-control" placeholder="Nhập mật khẩu" required>
            <i class="ri-eye-off-line input-icon-right" id="toggle-pw" onclick="togglePw()"></i>
          </div>
        </div>
        <div id="error-msg" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block btn-lg mt-md" id="submit-btn">
          <i class="ri-login-circle-line"></i> Đăng Nhập
        </button>
      </form>

      <div class="divider" style="border-color:rgba(220,165,174,.2);color:var(--text-muted)">Tài khoản demo</div>
      <div style="display:flex;flex-direction:column;gap:var(--sp-sm)">
        <button class="btn btn-ghost btn-sm" onclick="fillDemo('mai@gmail.com','123456')" style="border:1px solid rgba(220,165,174,.3);color:var(--text-body);justify-content:flex-start;gap:var(--sp-sm)">
          <i class="ri-user-line"></i> Khách hàng: mai@gmail.com / 123456
        </button>
        <button class="btn btn-ghost btn-sm" onclick="fillDemo('lan@betrap.vn','123456')" style="border:1px solid rgba(220,165,174,.3);color:var(--text-body);justify-content:flex-start;gap:var(--sp-sm)">
          <i class="ri-store-line"></i> Nhà cung cấp: lan@betrap.vn / 123456
        </button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../js/db.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    // Redirect if already logged in
    const s = API.auth.currentSession();
    if (s) window.location.href = s.role === 'provider' ? 'provider-dashboard.html' : 'dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px"></span>';
      try {
        const { session } = await API.auth.login({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        UI.toast('Đăng nhập thành công! 🎉', 'success');
        setTimeout(() => {
          window.location.href = session.role === 'provider' ? 'provider-dashboard.html' : 'dashboard.html';
        }, 800);
      } catch(err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<i class="ri-login-circle-line"></i> Đăng Nhập';
      }
    });

    function togglePw() {
      const inp = document.getElementById('password');
      const icon = document.getElementById('toggle-pw');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      icon.className = inp.type === 'password' ? 'ri-eye-off-line input-icon-right' : 'ri-eye-line input-icon-right';
    }
    function fillDemo(email, pw) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = pw;
    }
  </script>
</body>
</html>
