<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Chi Tiết Dịch Vụ — BêTráp</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    .detail-layout{display:grid;grid-template-columns:1fr 400px;gap:var(--sp-2xl);padding:var(--sp-2xl) 0}
    .main-img{width:100%;height:480px;object-fit:cover;border-radius:var(--r-xl);box-shadow:var(--shadow-md)}
    .tags{display:flex;gap:var(--sp-sm);flex-wrap:wrap;margin:var(--sp-md) 0}
    .tag{background:var(--gold-faint);color:var(--gold-dark);border:1px solid rgba(212,175,55,.2);padding:6px 16px;border-radius:var(--r-full);font-size:.8rem;font-weight:700}
    .booking-card{background:rgba(255,255,255,.8);backdrop-filter:blur(24px);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);padding:var(--sp-xl);position:sticky;top:calc(var(--nav-h) + var(--sp-lg));border:1px solid rgba(255,255,255,.6)}
    .provider-card{background:var(--cream-dark);border-radius:var(--r-lg);padding:var(--sp-lg);display:flex;align-items:center;gap:var(--sp-md);margin-bottom:var(--sp-xl)}
    .reviews-section{margin-top:var(--sp-xl)}
    .review-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--sp-md);margin-top:var(--sp-lg)}
    @media(max-width:1024px){.detail-layout{grid-template-columns:1fr}.booking-card{position:static}.review-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-content">
    <div class="container">
      <div style="padding:var(--sp-lg) 0">
        <a href="services.html" style="color:var(--text-muted);font-size:.875rem;display:inline-flex;align-items:center;gap:6px">
          <i class="ri-arrow-left-line"></i> Quay lại danh sách
        </a>
      </div>
      <div class="detail-layout" id="detail-content">
        <div style="text-align:center;padding:var(--sp-3xl)"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
  <div id="footer-container"></div>
  <div id="toast-container"></div>
  <div id="modal-overlay"></div>
  <script src="../js/db.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({duration:800, once:true});
    document.addEventListener('DOMContentLoaded', async () => {
      UI.initPage();
      UI.renderFooter('footer-container');
      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = 'services.html'; return; }

      const svc = await API.svc.getById(id);
      if (!svc) { location.href = 'services.html'; return; }

      document.title = svc.name + ' — BêTráp';
      const reviews = await API.review.getByService(id);

      const unit = (svc.category === 'ao-dai' || svc.category === 'lam-trap') ? 'bộ' : 'người';

      // Check wishlist state (non-blocking)
      let isFav = false;
      try { isFav = await API.favorites.check(id); } catch(_) {}

      document.getElementById('detail-content').innerHTML = `
        <div data-aos="fade-right">
          <img class="main-img animate-fadeIn" src="${svc.image.startsWith('http') ? svc.image : rootPath() + svc.image}" alt="${svc.name}">
          <div style="margin-top:var(--sp-lg)">
            <span style="font-size:.8rem;font-weight:700;color:var(--gold);letter-spacing:.08em;text-transform:uppercase">${UI.categoryIcon(svc.category)} ${UI.categoryLabel(svc.category)}</span>
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-md);flex-wrap:wrap;margin:var(--sp-sm) 0">
              <h1 style="font-size:2rem;margin:0;flex:1">${svc.name}</h1>
              <button id="fav-btn" onclick="toggleFav('${svc.id}')" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--r-full);border:1.5px solid ${isFav ? 'var(--pink)' : '#ccc'};background:${isFav ? 'rgba(220,165,174,.12)' : 'transparent'};color:${isFav ? 'var(--pink)' : '#999'};font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0">${isFav ? '♥' : '♡'} Yêu thích</button>
            </div>
            <div style="display:flex;align-items:center;gap:var(--sp-lg);flex-wrap:wrap;margin-bottom:var(--sp-md)">
              <span class="stars">${UI.stars(svc.rating)}</span>
              <span style="font-size:.875rem;color:var(--text-muted)">${svc.rating} · ${svc.reviewCount} đánh giá</span>
              <span style="font-size:.875rem;color:var(--text-muted)"><i class="ri-map-pin-line"></i> ${svc.location}</span>
            </div>
            <div class="tags">${(svc.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
            <div class="provider-card">
              <div class="navbar-avatar" style="width:52px;height:52px;font-size:1rem;flex-shrink:0">${(svc.providerName||'?')[0].toUpperCase()}</div>
              <div style="flex:1">
                <div style="font-weight:700">${svc.providerName||'Nhà cung cấp'}</div>
                <div style="font-size:.8rem;color:var(--text-muted)">${svc.providerBio||''}</div>
              </div>
            </div>
            <h3 style="margin-top:var(--sp-xl)">Mô Tả Dịch Vụ</h3>
            <div style="background:#fdfcfc;border-radius:var(--r-lg);padding:var(--sp-lg);margin-top:var(--sp-sm);border:1px solid rgba(0,0,0,0.03);">
              <p style="color:var(--text-dark);line-height:2.2;font-size:1.05rem;white-space:pre-line;">${svc.description}</p>
            </div>
            ${svc.gallery && svc.gallery.length > 0 ? `
            <h3 style="margin-top:var(--sp-xl)">Hình Ảnh Thực Tế / Kinh Nghiệm</h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));gap:var(--sp-sm);margin-top:var(--sp-md);">
              ${svc.gallery.map(g => `<img src="${g.startsWith('http') ? g : rootPath() + g}" style="width:100%;height:150px;object-fit:cover;border-radius:var(--r-md);cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" onclick="window.open(this.src, '_blank')">`).join('')}
            </div>
            ` : ''}
          </div>
          <div class="reviews-section">
            <h3>Đánh Giá Từ Khách Hàng (${reviews.length})</h3>
            ${reviews.length ? `<div class="review-grid">${reviews.map(r=>`
              <div class="review-card">
                <div class="review-header">
                  <div class="review-avatar">${r.customerAvatar||'?'}</div>
                  <div><div style="font-weight:700;font-size:.9rem">${r.customerName||'Khách hàng'}</div>
                  <div class="stars" style="font-size:.8rem">${UI.stars(r.rating)}</div></div>
                  <div style="margin-left:auto;font-size:.75rem;color:var(--text-muted)">${UI.timeAgo(r.createdAt)}</div>
                </div>
                <p class="review-text">${r.comment}</p>
              </div>`).join('')}</div>` : `<div class="empty-state"><div class="empty-icon">💬</div><h3>Chưa có đánh giá</h3></div>`}
          </div>
        </div>

        <!-- Booking Card -->
        <div data-aos="fade-left" data-aos-delay="100">
          <div class="booking-card animate-fadeInRight">
            <h3 style="margin-bottom:var(--sp-md);color:var(--gold)">Thông Tin Đặt Dịch Vụ</h3>
            <div class="form-group">
              <label class="form-label">Số lượng (Tuỳ chọn)</label>
              <select id="book-quantity" class="form-control">
                <option value="">-- Theo mặc định dịch vụ --</option>
                <option value="1">1 ${unit}</option>
                <option value="3">3 ${unit}</option>
                <option value="5">5 ${unit}</option>
                <option value="7">7 ${unit}</option>
                <option value="9">9 ${unit}</option>
                <option value="11">11 ${unit}</option>
                <option value="other">Số lượng khác (Ghi chú thêm)</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Ngày tổ chức</label>
              <input type="date" id="book-date" class="form-control" min="${new Date().toISOString().split('T')[0]}">
            </div>
            <div class="form-group">
              <label class="form-label">Giờ bắt đầu</label>
              <input type="time" id="book-time" class="form-control" value="08:00">
            </div>
            <div class="form-group">
              <label class="form-label">Địa chỉ tổ chức</label>
              <input type="text" id="book-address" class="form-control" placeholder="Số nhà, đường, phường, quận...">
            </div>
            <div class="form-group">
              <label class="form-label">Ghi chú thêm</label>
              <textarea id="book-note" class="form-control" rows="3" placeholder="Yêu cầu đặc biệt..."></textarea>
            </div>
            <button class="btn btn-primary btn-block btn-lg" onclick="bookNow('${svc.id}')"><i class="ri-calendar-check-line"></i> Đặt Dịch Vụ Ngay</button>
            <p style="font-size:.75rem;color:var(--text-muted);text-align:center;margin-top:var(--sp-md)">
              <i class="ri-time-line" style="color:var(--gold)"></i> Nhà cung cấp sẽ xác nhận đơn hàng trong thời gian sớm nhất
            </p>
          </div>
        </div>`;
    });

    async function bookNow(serviceId) {
      const sess = API.auth.currentSession();
      if (!sess) { UI.modal({ title:'Cần đăng nhập', body:'Vui lòng đăng nhập để đặt dịch vụ.', confirmText:'Đăng nhập', onConfirm:()=>location.href='login.html' }); return; }
      const date = document.getElementById('book-date').value;
      const time = document.getElementById('book-time').value;
      const address = document.getElementById('book-address').value;
      if (!date || !address) { UI.toast('Vui lòng điền ngày và địa chỉ!', 'error'); return; }
      
      let note = document.getElementById('book-note').value.trim();
      const qtySelect = document.getElementById('book-quantity');
      const qty = qtySelect.value;
      if (qty) {
        const qtyText = qtySelect.options[qtySelect.selectedIndex].text;
        const prefix = 'Số lượng: ' + (qty === 'other' ? 'Khác' : qtyText);
        note = note ? prefix + ' - ' + note : prefix;
      }
      
      try {
        const txn = await API.txn.create({ serviceId, date, time, address, note });
        location.href = `checkout.html?id=${txn.id}`;
      } catch (e) {
        UI.toast(e.message, 'error');
      }
    }

    function showConsultModal(serviceId) {
      const sess = API.auth.currentSession();
      if (!sess) { UI.modal({ title:'Cần đăng nhập', body:'Vui lòng đăng nhập để đăng ký tư vấn.', confirmText:'Đăng nhập', onConfirm:()=>location.href='login.html' }); return; }
      if (!sess.phone) { 
        UI.modal({ 
          title: 'Yêu Cầu Số Điện Thoại', 
          body: 'Tính năng này yêu cầu bạn phải có số điện thoại. Vui lòng vào Cài đặt (Dashboard) để cập nhật số điện thoại trước khi đăng ký tư vấn!', 
          confirmText: 'Đi tới Cập nhật', 
          onConfirm: () => { location.href = 'dashboard.html'; return true; } 
        }); 
        return; 
      }

      const body = `
        <div class="form-group" style="text-align:left">
          <label class="form-label">Ngày muốn tư vấn</label>
          <input type="date" id="consult-date" class="form-control" min="${new Date().toISOString().split('T')[0]}">
        </div>
        <div class="form-group" style="text-align:left">
          <label class="form-label">Giờ hẹn</label>
          <input type="time" id="consult-time" class="form-control" value="09:00">
        </div>
        <div class="form-group" style="text-align:left">
          <label class="form-label">Địa chỉ (hoặc Phương thức)</label>
          <input type="text" id="consult-address" class="form-control" placeholder="Gặp trực tiếp, hoặc Qua điện thoại/Zalo...">
        </div>
        <div class="form-group" style="text-align:left">
          <label class="form-label">Câu hỏi/Ghi chú thêm</label>
          <textarea id="consult-note" class="form-control" rows="3" placeholder="Ví dụ: Tôi muốn hỏi thêm về các gói dịch vụ..."></textarea>
        </div>
      `;
      UI.modal({
        title: 'Đăng Ký Tư Vấn',
        body: body,
        confirmText: 'Gửi yêu cầu',
        onConfirm: async () => {
          const date = document.getElementById('consult-date').value;
          const time = document.getElementById('consult-time').value;
          const address = document.getElementById('consult-address').value;
          const note = document.getElementById('consult-note').value;
          if (!date || !address) { UI.toast('Vui lòng nhập đầy đủ ngày và địa chỉ/phương thức', 'error'); return false; }

          try {
            await API.consultation.create({ serviceId, date, time, address, note });
            UI.toast('Đã gửi yêu cầu tư vấn thành công!', 'success');
            return true;
          } catch(e) {
            UI.toast(e.message || 'Lỗi khi gửi yêu cầu', 'error');
            return false;
          }
        }
      });
    }

    async function toggleFav(serviceId) {
      const sess = API.auth.currentSession();
      if (!sess) { UI.toast('Vui lòng đăng nhập để lưu yêu thích!', 'warning'); return; }
      try {
        const result = await API.favorites.toggle(serviceId);
        const nowFav = result?.isFavorited ?? result?.favorited ?? !!(result);
        const btn = document.getElementById('fav-btn');
        if (btn) {
          btn.textContent = (nowFav ? '♥' : '♡') + ' Yêu thích';
          btn.style.color = nowFav ? 'var(--pink)' : '#999';
          btn.style.borderColor = nowFav ? 'var(--pink)' : '#ccc';
          btn.style.background = nowFav ? 'rgba(220,165,174,.12)' : 'transparent';
        }
        UI.toast(nowFav ? 'Đã thêm vào yêu thích!' : 'Đã bỏ khỏi yêu thích', 'success');
      } catch(e) {
        UI.toast(e.message || 'Không thể cập nhật yêu thích', 'error');
      }
    }

    async function startChat(providerId, serviceId) {
      const sess = API.auth.currentSession();
      if (!sess) { location.href = 'login.html'; return; }
      try {
        const conv = await API.chat.startConversation(providerId, serviceId);
        location.href = `chat.html?conv=${conv.id}`;
      } catch(e) {
        UI.toast(e.message || 'Không thể bắt đầu trò chuyện', 'error');
      }
    }
  </script>
</body>
</html>
