<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Lịch Sử Giao Dịch — BêTráp</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <style>
    .history-filters{display:flex;gap:var(--sp-sm);flex-wrap:wrap;margin:var(--sp-lg) 0}
    .orders-list{display:flex;flex-direction:column;gap:var(--sp-md)}
    .order-card-full{background:white;border-radius:var(--r-lg);padding:var(--sp-lg);box-shadow:var(--shadow-xs);border-left:4px solid var(--gold);transition:box-shadow var(--t-fast);cursor:pointer}
    .order-card-full:hover{box-shadow:var(--shadow-md)}
    .order-card-full.border-pending{border-left-color:var(--warning)}
    .order-card-full.border-confirmed{border-left-color:var(--info)}
    .order-card-full.border-done{border-left-color:var(--success)}
    .order-card-full.border-cancelled{border-left-color:var(--error)}
    .order-top{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-md);flex-wrap:wrap}
    .order-body{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-md);margin-top:var(--sp-md);padding-top:var(--sp-md);border-top:1px solid rgba(220,165,174,.06)}
    .order-meta-item{font-size:.8rem;color:var(--text-muted)}
    .order-meta-item strong{display:block;color:var(--text-dark);font-size:.875rem;margin-top:2px}
    .order-actions{display:flex;gap:var(--sp-sm);margin-top:var(--sp-md);flex-wrap:wrap}
    @media(max-width:768px){.order-body{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:480px){.order-body{grid-template-columns:1fr}}

    /* Review modal star picker */
    .star-picker{display:flex;gap:var(--sp-sm);font-size:2rem;cursor:pointer}
    .star-btn{color:#DDD;transition:color var(--t-fast)}
    .star-btn.active,.star-btn:hover{color:var(--gold-light)}
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-header">
    <div class="container">
      <h1>Lịch Sử Giao Dịch</h1>
      <p>Theo dõi tất cả đơn hàng của bạn</p>
    </div>
  </div>

  <div class="container page-content" style="padding-top:0;padding-bottom:var(--sp-3xl)">
    <div class="history-filters">
      <button class="filter-chip active" data-status="">Tất cả</button>
      <button class="filter-chip" data-status="pending">Chờ xác nhận</button>
      <button class="filter-chip" data-status="confirmed">Đã xác nhận</button>
      <button class="filter-chip" data-status="done">Hoàn thành</button>
      <button class="filter-chip" data-status="cancelled">Đã huỷ</button>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-md)">
      <div id="order-count" style="font-size:.875rem;color:var(--text-muted)"></div>
      <select id="sort-select" class="form-control" style="width:auto;font-size:.875rem;padding:8px 14px" onchange="render()">
        <option value="desc">Mới nhất</option>
        <option value="asc">Cũ nhất</option>
      </select>
    </div>

    <div class="orders-list" id="orders-list"></div>
  </div>

  <div id="footer-container"></div>
  <div id="toast-container"></div>
  <div id="modal-overlay"></div>
  <script src="../js/db.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    let allOrders = [];
    let activeStatus = '';
    let reviewRating = 5;

    document.addEventListener('DOMContentLoaded', async () => {
      UI.initPage();
      UI.renderFooter('footer-container');
      const sess = API.auth.requireAuth();
      if (!sess) return;

      allOrders = await API.txn.getMyOrders();

      document.querySelectorAll('[data-status]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('[data-status]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          activeStatus = btn.dataset.status;
          render();
        });
      });
      render();
    });

    function render() {
      const sort = document.getElementById('sort-select').value;
      let list = activeStatus ? allOrders.filter(o=>o.status===activeStatus) : [...allOrders];
      list.sort((a,b) => sort==='desc' ? new Date(b.createdAt)-new Date(a.createdAt) : new Date(a.createdAt)-new Date(b.createdAt));
      document.getElementById('order-count').textContent = `${list.length} đơn hàng`;

      const el = document.getElementById('orders-list');
      if (!list.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3>Chưa có đơn hàng nào</h3><p>Hãy đặt dịch vụ đám hỏi đầu tiên của bạn!</p><a href="services.html" class="btn btn-primary mt-md">Tìm Dịch Vụ</a></div>`;
        return;
      }
      el.innerHTML = list.map(o => {
        const svc = DB.services.findById(o.serviceId);
        const provider = DB.users.findById(o.providerId);
        const hasReview = DB.reviews.findByTxn(o.id);
        return `
        <div class="order-card-full border-${o.status} animate-fadeInUp" onclick="location.href='checkout.html?id=${o.id}'">
          <div class="order-top">
            <div>
              <div class="order-id">${o.id}</div>
              <div style="font-weight:700;font-size:1rem;margin-top:4px">${o.serviceName}</div>
              <div style="font-size:.8rem;color:var(--text-muted);margin-top:2px">
                <i class="ri-store-2-line"></i> ${provider?.name||'Nhà cung cấp'}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              ${UI.statusBadge(o.status)}
              <div style="font-family:var(--font-h);font-size:1.3rem;font-weight:700;color:var(--gold);margin-top:var(--sp-sm)">${UI.formatCurrency(o.price)}</div>
            </div>
          </div>
          <div class="order-body">
            <div class="order-meta-item">Ngày đặt<strong>${UI.formatDate(o.createdAt)}</strong></div>
            <div class="order-meta-item">Ngày thực hiện<strong>${o.date||'—'}</strong></div>
            <div class="order-meta-item">Giờ<strong>${o.time||'—'}</strong></div>
            <div class="order-meta-item">Thanh toán<strong>${o.paymentStatus==='paid'?'<span style="color:var(--success)">✓ Đã thanh toán</span>':'<span style="color:var(--warning)">Chờ thanh toán</span>'}</strong></div>
          </div>
          <div class="order-actions" onclick="event.stopPropagation()">
            <a href="checkout.html?id=${o.id}" class="btn btn-outline btn-sm"><i class="ri-eye-line"></i> Xem Chi Tiết</a>
            ${o.status==='done'&&!hasReview?`<button class="btn btn-gold btn-sm" onclick="openReview('${o.id}','${o.serviceId}')"><i class="ri-star-line"></i> Đánh Giá</button>`:''}
            ${o.status==='pending'?`<button class="btn btn-danger btn-sm" onclick="cancelOrder('${o.id}')"><i class="ri-close-line"></i> Huỷ Đơn</button>`:''}
            <a href="chat.html" class="btn btn-ghost btn-sm"><i class="ri-message-3-line"></i> Chat</a>
          </div>
        </div>`}).join('');
    }

    function openReview(txnId, serviceId) {
      reviewRating = 5;
      UI.modal({
        title: 'Đánh Giá Dịch Vụ',
        body: `
          <p style="color:var(--text-muted);margin-bottom:var(--sp-lg)">Bạn cảm thấy thế nào về dịch vụ này?</p>
          <div class="star-picker" id="star-picker">
            ${[1,2,3,4,5].map(i=>`<span class="star-btn active" data-val="${i}" onclick="setRating(${i})">★</span>`).join('')}
          </div>
          <div id="rating-label" style="margin-top:var(--sp-sm);color:var(--gold);font-weight:600">Xuất sắc</div>
          <div class="form-group mt-lg">
            <label class="form-label">Nhận xét của bạn</label>
            <textarea id="review-comment" class="form-control" rows="4" placeholder="Chia sẻ trải nghiệm của bạn..."></textarea>
          </div>`,
        confirmText: 'Gửi Đánh Giá',
        confirmClass: 'btn-gold',
        onConfirm: async () => {
          const comment = document.getElementById('review-comment').value;
          try {
            await API.review.create({ serviceId, transactionId: txnId, rating: reviewRating, comment });
            UI.toast('Cảm ơn bạn đã đánh giá! ⭐', 'success');
            allOrders = await API.txn.getMyOrders();
            render();
          } catch(e) { UI.toast(e.message, 'error'); }
        }
      });
    }

    function setRating(val) {
      reviewRating = val;
      document.querySelectorAll('.star-btn').forEach(s => {
        s.classList.toggle('active', +s.dataset.val <= val);
      });
      const labels = ['', 'Tệ', 'Chưa tốt', 'Bình thường', 'Tốt', 'Xuất sắc'];
      const lbl = document.getElementById('rating-label');
      if (lbl) lbl.textContent = labels[val];
    }

    async function cancelOrder(id) {
      UI.modal({
        title: 'Huỷ Đơn Hàng?',
        body: '<p>Bạn có chắc muốn huỷ đơn hàng này? Hành động không thể hoàn tác.</p>',
        confirmText: 'Xác nhận huỷ',
        confirmClass: 'btn-danger',
        onConfirm: async () => {
          await API.txn.updateStatus(id, 'cancelled');
          UI.toast('Đã huỷ đơn hàng!', 'info');
          allOrders = await API.txn.getMyOrders();
          render();
        }
      });
    }
  </script>
</body>
</html>
