<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Dự Án BêTráp — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css?v=1.6">
  <link rel="stylesheet" href="../css/components.css?v=1.6">
  <style>
    /* Styling for portfolio items */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      padding: var(--sp-2xl) 0;
    }
    .portfolio-item {
      border-radius: var(--r-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all var(--t-normal);
      cursor: pointer;
      background: white;
      text-decoration: none;
      color: inherit;
    }
    .portfolio-item:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }
    .portfolio-img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      transition: transform var(--t-normal);
    }
    .portfolio-item:hover .portfolio-img {
      transform: scale(1.05);
    }
    .portfolio-content {
      padding: var(--sp-md);
    }
    .portfolio-title {
      font-family: var(--font-h);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    .portfolio-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .portfolio-tag {
      display: inline-block;
      background: rgba(212, 185, 150, 0.2);
      color: var(--gold-dark);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .page-header {
      background: var(--grad-hero);
      padding: calc(var(--nav-h) + var(--sp-2xl)) 0 var(--sp-2xl);
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="nav-container"></div>

  <div class="page-header">
    <div class="container">
      <h1 class="font-billgates" style="font-size: clamp(3rem, 6vw, 4.5rem); color: var(--gold-dark);">Dự Án Đã Thực Hiện</h1>
      <p style="font-size: 1.1rem; max-width: 600px; margin: 16px auto 0;">Chiêm ngưỡng những khoảnh khắc đẹp nhất từ các lễ cưới hỏi mà BêTráp đã hân hạnh được đồng hành.</p>
    </div>
  </div>

  <div class="container">
    <div class="portfolio-grid" id="portfolio-list">
      <!-- Mẫu skeleton khi đang load -->
      <div style="text-align:center; padding: 40px; grid-column: 1 / -1;"><div class="spinner"></div></div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="../js/api.js?v=1.1"></script>
  <script src="../js/ui.js?v=1.1"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      UI.initPage();
      UI.renderFooter('footer-container');
      renderPortfolio();
    });

    function renderPortfolio() {
      const portfolioData = [
        { title: "Đám Hỏi Thanh & Tùng", category: "Tráp Ăn Hỏi & Áo Dài", date: "Tháng 5/2026", location: "Hà Nội", image: "https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=700&q=80" },
        { title: "Lễ Cưới Lan & Nam", category: "Trọn Gói Dịch Vụ", date: "Tháng 4/2026", location: "TP. HCM", image: "https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=500&q=80" },
        { title: "Ngày Vui Minh & Hoa", category: "Trang Trí Gia Tiên", date: "Tháng 3/2026", location: "Đà Nẵng", image: "../assets/images/avtLamTrap.jpg" },
        { title: "Kỷ Niệm Của Tuấn & Nga", category: "Media & Make Up", date: "Tháng 2/2026", location: "Hải Phòng", image: "../assets/images/z7872642854353_79be49449ae3f1cc2d82ae8e3e44f8d1.jpg" },
        { title: "Đám Cưới Của Dũng & Thảo", category: "Đội Cưới Hỏi", date: "Tháng 1/2026", location: "Cần Thơ", image: "../assets/images/avtBeTrap.jpg" },
        { title: "Khoảnh Khắc Của Duy & Mai", category: "Áo Dài Truyền Thống", date: "Tháng 12/2025", location: "Huế", image: "../assets/images/avtAoDai.jpg" }
      ];

      const el = document.getElementById('portfolio-list');
      el.innerHTML = portfolioData.map(p => `
        <div class="portfolio-item">
          <div style="overflow:hidden">
            <img src="${p.image}" class="portfolio-img" alt="${p.title}">
          </div>
          <div class="portfolio-content">
            <div class="portfolio-title">${p.title}</div>
            <div class="portfolio-meta"><i class="ri-map-pin-line"></i> ${p.location} • ${p.date}</div>
            <div class="portfolio-tag">${p.category}</div>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
