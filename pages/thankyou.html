<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Cảm Ơn Bạn — BêTráp</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <style>
    body { background: var(--cream); }
    .ty-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-xl);
    }
    .ty-card {
      background: white;
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-lg);
      padding: var(--sp-3xl) var(--sp-xl);
      max-width: 560px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .ty-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--gold), var(--rose));
    }
    .ty-icon {
      font-size: 5rem;
      margin-bottom: var(--sp-lg);
      animation: bounceIn .6s ease;
    }
    .ty-title {
      font-family: var(--font-h);
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: var(--sp-sm);
    }
    .ty-sub {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: var(--sp-xl);
    }
    .ty-stars {
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: 4px;
      margin-bottom: var(--sp-lg);
    }
    .ty-review-box {
      background: var(--cream);
      border-radius: var(--r-lg);
      padding: var(--sp-lg);
      margin-bottom: var(--sp-xl);
      text-align: left;
    }
    .ty-review-comment {
      font-style: italic;
      color: var(--text-dark);
      font-size: .95rem;
      line-height: 1.6;
    }
    .ty-actions {
      display: flex;
      gap: var(--sp-md);
      justify-content: center;
      flex-wrap: wrap;
    }
    @keyframes bounceIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .confetti {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
</head>
<body>
  <div id="nav-container"></div>

  <!-- Confetti background -->
  <div class="confetti" id="confetti-container"></div>

  <div class="ty-wrapper">
    <div class="ty-card animate-fadeInUp" style="position:relative;z-index:1">
      <div class="ty-icon">🎉</div>
      <div class="ty-title">Cảm Ơn Bạn!</div>
      <p class="ty-sub" id="ty-message">
        Đơn hàng của bạn đã được hoàn thành thành công.<br>
        Cảm ơn bạn đã tin tưởng và sử dụng dịch vụ BêTráp!
      </p>

      <div id="review-summary" style="display:none">
        <div class="ty-stars" id="ty-stars">★★★★★</div>
        <div class="ty-review-box">
          <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Nhận xét của bạn</div>
          <div class="ty-review-comment" id="ty-comment"></div>
        </div>
      </div>

      <div class="ty-actions">
        <a href="services.html" class="btn btn-primary">
          <i class="ri-search-line"></i> Khám Phá Thêm Dịch Vụ
        </a>
        <a href="history.html" class="btn btn-ghost">
          <i class="ri-list-check"></i> Lịch Sử Đơn Hàng
        </a>
      </div>

      <div style="margin-top:var(--sp-xl);padding-top:var(--sp-lg);border-top:1px solid rgba(220,165,174,.1);font-size:.8rem;color:var(--text-muted)">
        <i class="ri-heart-line" style="color:var(--rose)"></i>
        BêTráp luôn đồng hành cùng những khoảnh khắc đặc biệt của bạn
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../js/db.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      UI.initPage();

      // Đọc params từ URL
      const params = new URLSearchParams(location.search);
      const rating  = parseInt(params.get('rating'))  || 0;
      const comment = params.get('comment') || '';
      const skipped = params.get('skipped') === '1';

      if (skipped) {
        document.getElementById('ty-message').innerHTML =
          'Đơn hàng của bạn đã được hoàn thành thành công.<br>' +
          '<span style="color:var(--text-muted);font-size:.9rem">Bạn có thể đánh giá dịch vụ bất cứ lúc nào trong Lịch Sử Đơn Hàng.</span>';
      } else if (rating > 0) {
        const summaryEl = document.getElementById('review-summary');
        summaryEl.style.display = 'block';

        const stars = '★'.repeat(rating) + '☆'.repeat(5 - rating);
        document.getElementById('ty-stars').textContent = stars;

        if (comment) {
          document.getElementById('ty-comment').textContent = '"' + comment + '"';
        } else {
          document.getElementById('ty-comment').textContent = '(Không có nhận xét thêm)';
          document.querySelector('.ty-review-box').style.display = 'none';
        }
      }

      // Tạo confetti
      spawnConfetti();
    });

    function spawnConfetti() {
      const colors = ['#DCA5AE','#C9756C','#F5E6CA','#E8C5B0','#BFA7A2','#gold','#e74c3c','#3498db','#2ecc71'];
      const container = document.getElementById('confetti-container');
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = '-20px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width  = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animationDuration = (2 + Math.random() * 3) + 's';
        piece.style.animationDelay = (Math.random() * 1.5) + 's';
        container.appendChild(piece);
      }
    }
  </script>
</body>
</html>
